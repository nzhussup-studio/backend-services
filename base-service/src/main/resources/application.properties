spring.application.name=base-service
server.port=8010

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${SPRING_DATASOURCE_HOST:localhost}:${SPRING_DATASOURCE_PORT:5432}/${SPRING_DATASOURCE_DB:personal_website_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:nzhussup}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:nzhussup}
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}


# Log HTTP requests and responses
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet=DEBUG
logging.level.org.springframework.security=DEBUG

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.show-actuator=true

springdoc.api-docs.path=/v1/base/v3/api-docs
springdoc.swagger-ui.path=/v1/base/swagger-ui.html
