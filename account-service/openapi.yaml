---
openapi: 3.0.1
info:
  contact:
    name: Nurzhanat Zhussup
    url: https://github.com/nzhussup
  description: API for authenticated self-service account management through Keycloak.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: Account Service API
  version: 1.0.0
paths:
  "/health":
    get:
      description: Returns 200 OK if the service is up
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/model.SuccessResponse"
      summary: Health check endpoint
      tags:
      - Health
  "/v1/account":
    delete:
      description: Logs out and deletes the current Keycloak user identified by the
        bearer token subject.
      responses:
        '204':
          description: No Content
          content:
            application/json:
              schema:
                type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/model.ErrorResponse"
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/model.ErrorResponse"
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/model.ErrorResponse"
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/model.ErrorResponse"
      security:
      - ApiKeyAuth: []
      summary: Delete the currently authenticated account
      tags:
      - Account
components:
  schemas:
    model.ErrorResponse:
      properties:
        error:
          example: Unauthorized
          type: string
      type: object
    model.SuccessResponse:
      properties:
        message:
          example: OK
          type: string
      type: object
  securitySchemes:
    ApiKeyAuth:
      in: header
      name: Authorization
      type: apiKey
