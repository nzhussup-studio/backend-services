spring.application.name=auth-service
server.port=8083

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${SPRING_DATASOURCE_HOST:localhost}:${SPRING_DATASOURCE_PORT:5432}/${SPRING_DATASOURCE_DB:personal_website_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:nzhussup}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:nzhussup}
security.jwt.secret-key=${SECURITY_JWT_SECRET_KEY:local-dev-secret-key}


# Log HTTP requests and responses
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet=DEBUG
logging.level.org.springframework.security=DEBUG

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.show-actuator=true

springdoc.api-docs.path=/auth/v3/api-docs
springdoc.swagger-ui.path=/auth/swagger-ui.html
