---
openapi: 3.0.1
info:
  title: Backend Services API
  version: 1.0.0
paths:
  "/v1/base/work-experience":
    get:
      tags:
      - work-experience-controller
      operationId: listWorkExperience
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                type: array
                items:
                  type: object
    put:
      tags:
      - work-experience-controller
      operationId: updateWorkExperience
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/base_service_WorkExperience"
        required: true
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/base_service_WorkExperience"
    post:
      tags:
      - work-experience-controller
      operationId: createWorkExperience
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/base_service_WorkExperience"
        required: true
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/base_service_WorkExperience"
    delete:
      tags:
      - work-experience-controller
      operationId: deleteWorkExperience
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/base_service_WorkExperience"
        required: true
      responses:
        '200':
          description: OK
  "/v1/base/skill":
    get:
      tags:
      - skill-controller
      operationId: listSkill
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                type: array
                items:
                  type: object
    put:
      tags:
      - skill-controller
      operationId: updateSkill
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/base_service_Skill"
        required: true
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/base_service_Skill"
    post:
      tags:
      - skill-controller
      operationId: createSkill
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/base_service_Skill"
        required: true
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/base_service_Skill"
    delete:
      tags:
      - skill-controller
      operationId: deleteSkill
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/base_service_Skill"
        required: true
      responses:
        '200':
          description: OK
  "/v1/base/project":
    get:
      tags:
      - project-controller
      operationId: listProject
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                type: array
                items:
                  type: object
    put:
      tags:
      - project-controller
      operationId: updateProject
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/base_service_Project"
        required: true
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/base_service_Project"
    post:
      tags:
      - project-controller
      operationId: createProject
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/base_service_Project"
        required: true
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/base_service_Project"
    delete:
      tags:
      - project-controller
      operationId: deleteProject
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/base_service_Project"
        required: true
      responses:
        '200':
          description: OK
  "/v1/base/education":
    get:
      tags:
      - education-controller
      operationId: listEducation
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                type: array
                items:
                  type: object
    put:
      tags:
      - education-controller
      operationId: updateEducation
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/base_service_Education"
        required: true
      responses:
        '200':
          description: OK
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/base_service_Education"
    post:
      tags:
      - education-controller
      operationId: createEducation
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/base_service_Education"
        required: true
      responses:
