name: Backend Test
description: Run tests for a backend service

inputs:
  service_path:
    description: Path to the service directory
    required: true
  lang:
    description: Service language
    required: true

runs:
  using: composite
  steps:
    - name: Set up Go
      if: ${{ inputs.lang == 'go' }}
      uses: actions/setup-go@v5
      with:
        go-version-file: ${{ inputs.service_path }}/go.mod

    - name: Set up Java
      if: ${{ inputs.lang == 'java' }}
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "21"
        cache: maven

    - name: Run Go tests
      if: ${{ inputs.lang == 'go' }}
      shell: bash
      working-directory: ${{ inputs.service_path }}
      run: go test ./... -v

    - name: Run Java tests
      if: ${{ inputs.lang == 'java' }}
      shell: bash
      working-directory: ${{ inputs.service_path }}
      run: |
        chmod +x mvnw
        ./mvnw -B test
