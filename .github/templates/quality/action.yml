name: Backend Quality
description: Run quality checks for a backend service

inputs:
  service_path:
    description: Path to the service directory
    required: true
  lang:
    description: Service language
    required: true

runs:
  using: composite
  steps:
    - name: Set up Go
      if: ${{ inputs.lang == 'go' }}
      uses: actions/setup-go@v5
      with:
        go-version-file: ${{ inputs.service_path }}/go.mod
        cache-dependency-path: ${{ inputs.service_path }}/go.sum

    - name: Set up Java
      if: ${{ inputs.lang == 'java' }}
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: "21"
        cache: maven

    - name: Run Go quality checks
      if: ${{ inputs.lang == 'go' }}
      shell: bash
      working-directory: ${{ inputs.service_path }}
      run: |
        test -z "$(gofmt -l .)"
        go vet ./...

    - name: Run Java quality checks
      if: ${{ inputs.lang == 'java' }}
      shell: bash
      working-directory: ${{ inputs.service_path }}
      run: |
        chmod +x mvnw
        ./mvnw -B -DskipTests compile
