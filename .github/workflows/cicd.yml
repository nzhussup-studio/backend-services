name: Backend Services CI/CD

on:
  push:
    branches:
      - "**"
    paths:
      - ".github/services.json"
      - "api-gateway/**"
      - "auth-service/**"
      - "base-service/**"
      - "image-service/**"
      - "llm-service/**"
      - "redis-server/**"
      - "user-service/**"
      - ".github/templates/**"
      - ".github/scripts/**"
      - ".github/workflows/cicd.yml"
  workflow_dispatch:

jobs:
  prepare:
    name: Prepare Matrix
    runs-on: ubuntu-latest
    outputs:
      build_changed: ${{ steps.prepare.outputs.build_changed }}
      build_matrix: ${{ steps.prepare.outputs.build_matrix }}
      checked_changed: ${{ steps.prepare.outputs.checked_changed }}
      checked_matrix: ${{ steps.prepare.outputs.checked_matrix }}
      deployments: ${{ steps.prepare.outputs.deployments }}
      deployments_joined: ${{ steps.prepare.outputs.deployments_joined }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build changed-services matrix
        id: prepare
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            CHANGED_FILES=""
          else
            BEFORE_SHA="${{ github.event.before }}"
            if [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              BEFORE_SHA="$(git rev-parse HEAD^)"
            fi
            CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" "${{ github.sha }}")"
          fi

          export CHANGED_FILES
          python3 .github/scripts/prepare_matrix.py
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}

  quality:
    name: Quality
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.checked_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.prepare.outputs.checked_matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run quality checks
        uses: ./.github/templates/quality
        with:
          service_path: ${{ matrix.service.path }}
          lang: ${{ matrix.service.lang }}

  test:
    name: Test
    runs-on: ubuntu-latest
    needs:
      - prepare
      - quality
    if: needs.prepare.outputs.checked_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.prepare.outputs.checked_matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests
        uses: ./.github/templates/test
        with:
          service_path: ${{ matrix.service.path }}
          lang: ${{ matrix.service.lang }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - prepare
      - test
    if: |
      always() &&
      needs.prepare.outputs.build_changed == 'true' &&
      github.ref == 'refs/heads/main' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.prepare.outputs.build_matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and push Docker image
        uses: ./.github/templates/build
        with:
          service_path: ${{ matrix.service.path }}
          image_name: ${{ matrix.service.image_name }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    if: |
      needs.prepare.outputs.build_changed == 'true' &&
      github.ref == 'refs/heads/main' &&
      needs.build.result == 'success'
    steps:
      - name: Restart changed deployments
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOYMENTS_JOINED: ${{ needs.prepare.outputs.deployments_joined }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DEPLOYMENTS_JOINED
          script: |
            set -euo pipefail
            if [[ -z "${DEPLOYMENTS_JOINED:-}" ]]; then
              exit 0
            fi
            for deployment in $DEPLOYMENTS_JOINED; do
              kubectl rollout restart deployment/"$deployment"
            done
