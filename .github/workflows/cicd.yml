name: Backend Services CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  prepare:
    name: Prepare Matrix
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.prepare.outputs.build_matrix }}
      checked_changed: ${{ steps.prepare.outputs.checked_changed }}
      checked_matrix: ${{ steps.prepare.outputs.checked_matrix }}
      deployments_joined: ${{ steps.prepare.outputs.deployments_joined }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build service matrix
        id: prepare
        shell: bash
        run: python3 .github/scripts/prepare_matrix.py

  quality:
    name: Quality
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.checked_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.prepare.outputs.checked_matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run quality checks
        uses: ./.github/templates/quality
        with:
          service_path: ${{ matrix.service.path }}
          lang: ${{ matrix.service.lang }}

  test:
    name: Test
    runs-on: ubuntu-latest
    needs:
      - prepare
      - quality
    if: needs.prepare.outputs.checked_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.prepare.outputs.checked_matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests
        uses: ./.github/templates/test
        with:
          service_path: ${{ matrix.service.path }}
          lang: ${{ matrix.service.lang }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - prepare
      - test
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.prepare.outputs.build_matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and push Docker image
        uses: ./.github/templates/build
        with:
          service_path: ${{ matrix.service.path }}
          image_name: ${{ matrix.service.image_name }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.build.result == 'success'
    steps:
      - name: Restart deployments
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOYMENTS_JOINED: ${{ needs.prepare.outputs.deployments_joined }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DEPLOYMENTS_JOINED
          script: |
            set -euo pipefail
            if [[ -z "${DEPLOYMENTS_JOINED:-}" ]]; then
              exit 0
            fi
            for deployment in $DEPLOYMENTS_JOINED; do
              kubectl rollout restart deployment/"$deployment"
            done
