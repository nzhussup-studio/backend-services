services:
  postgres:
    image: postgres:17
    container_name: backend-services-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-personal_website_db}
      POSTGRES_USER: ${POSTGRES_USER:-nzhussup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nzhussup}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-nzhussup} -d ${POSTGRES_DB:-personal_website_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - backend-internal

  keycloak:
    build:
      context: ../keycloak-service
      dockerfile: Dockerfile
    container_name: backend-services-keycloak
    depends_on:
      keycloak-db-init:
        condition: service_completed_successfully
    command:
      - start-dev
      - --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_DB:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-nzhussup}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-nzhussup}
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-localhost}
      KC_HOSTNAME_STRICT: ${KEYCLOAK_HOSTNAME_STRICT:-false}
      KC_HOSTNAME_STRICT_HTTPS: ${KEYCLOAK_HOSTNAME_STRICT_HTTPS:-false}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-root}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-root}
      BACKEND_AUTH_CLIENT_SECRET: ${BACKEND_AUTH_CLIENT_SECRET:-backend-auth-dev-secret}
      KEYCLOAK_REALM_ID: ${KEYCLOAK_REALM_ID:-backend-auth-dev}
      KEYCLOAK_REALM_NAME: ${KEYCLOAK_REALM_NAME:-backend-auth-dev}
      KEYCLOAK_REALM_DISPLAY_NAME: ${KEYCLOAK_REALM_DISPLAY_NAME:-Backend Auth Dev}
      KEYCLOAK_SSL_REQUIRED: ${KEYCLOAK_SSL_REQUIRED:-NONE}
      KEYCLOAK_REGISTRATION_ALLOWED: ${KEYCLOAK_REGISTRATION_ALLOWED:-true}
      KEYCLOAK_LOGIN_WITH_EMAIL_ALLOWED: ${KEYCLOAK_LOGIN_WITH_EMAIL_ALLOWED:-true}
      KEYCLOAK_RESET_PASSWORD_ALLOWED: ${KEYCLOAK_RESET_PASSWORD_ALLOWED:-true}
      KEYCLOAK_REMEMBER_ME: ${KEYCLOAK_REMEMBER_ME:-true}
      KEYCLOAK_VERIFY_EMAIL: ${KEYCLOAK_VERIFY_EMAIL:-false}
      KEYCLOAK_BACKEND_CLIENT_ID: ${KEYCLOAK_BACKEND_CLIENT_ID:-backend-auth-client}
      KEYCLOAK_BACKEND_CLIENT_NAME: ${KEYCLOAK_BACKEND_CLIENT_NAME:-Backend Auth Client}
      KEYCLOAK_BACKEND_STANDARD_FLOW_ENABLED: ${KEYCLOAK_BACKEND_STANDARD_FLOW_ENABLED:-true}
      KEYCLOAK_BACKEND_DIRECT_ACCESS_GRANTS_ENABLED: ${KEYCLOAK_BACKEND_DIRECT_ACCESS_GRANTS_ENABLED:-true}
      KEYCLOAK_FRONTEND_CLIENT_ID: ${KEYCLOAK_FRONTEND_CLIENT_ID:-frontend-admin-auth-client}
      KEYCLOAK_FRONTEND_CLIENT_NAME: ${KEYCLOAK_FRONTEND_CLIENT_NAME:-Frontend Admin Auth Client}
      KEYCLOAK_FRONTEND_ROOT_URL: ${KEYCLOAK_FRONTEND_ROOT_URL:-http://localhost:5173}
      KEYCLOAK_FRONTEND_BASE_URL: ${KEYCLOAK_FRONTEND_BASE_URL:-http://localhost:5173}
      KEYCLOAK_FRONTEND_REDIRECT_URIS_JSON: ${KEYCLOAK_FRONTEND_REDIRECT_URIS_JSON:-["http://localhost:5173/*","http://127.0.0.1:5173/*","http://localhost:4173/*","http://127.0.0.1:4173/*"]}
      KEYCLOAK_FRONTEND_WEB_ORIGINS_JSON: ${KEYCLOAK_FRONTEND_WEB_ORIGINS_JSON:-["http://localhost:5173","http://127.0.0.1:5173","http://localhost:4173","http://127.0.0.1:4173"]}
      KEYCLOAK_USERS_FILE: /opt/keycloak/dev/dev-users.json
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - ./.keycloak/dev-users.json:/opt/keycloak/dev/dev-users.json:ro
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    networks:
      - backend-internal

  keycloak-master-realm-init:
    image: quay.io/keycloak/keycloak:26.1
    depends_on:
      keycloak:
        condition: service_started
    environment:
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-root}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-root}
    entrypoint: ["/bin/sh", "/init/patch-master-realm.sh"]
    volumes:
      - ./.keycloak/patch-master-realm.sh:/init/patch-master-realm.sh:ro
    networks:
      - backend-internal

  keycloak-db-init:
    image: postgres:17
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nzhussup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nzhussup}
      KEYCLOAK_DB: ${KEYCLOAK_DB:-keycloak}
    entrypoint: ["/bin/sh", "/init/create-keycloak-db.sh"]
    volumes:
      - ./.postgres/create-keycloak-db.sh:/init/create-keycloak-db.sh:ro
    networks:
      - backend-internal

  redis:
    image: redis:7.4
    container_name: backend-services-redis
    command:
      [
        "redis-server",
        "--save",
        "900",
        "1",
        "--save",
        "300",
        "10",
        "--save",
        "60",
        "10000",
        "--loglevel",
        "notice",
      ]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - backend-internal

  auth-service:
    build:
      context: ../auth-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_HOST: postgres
      SPRING_DATASOURCE_PORT: 5432
      SPRING_DATASOURCE_DB: ${POSTGRES_DB:-personal_website_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-nzhussup}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-nzhussup}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SECURITY_JWT_SECRET_KEY: ${SECURITY_JWT_SECRET_KEY:-local-dev-secret-key}
    networks:
      - backend-internal

  base-service:
    build:
      context: ../base-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    environment:
      AUTH_SERVICE_URL: http://auth-service:8083
      SPRING_DATASOURCE_HOST: postgres
      SPRING_DATASOURCE_PORT: 5432
      SPRING_DATASOURCE_DB: ${POSTGRES_DB:-personal_website_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-nzhussup}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-nzhussup}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks:
      - backend-internal

  user-service:
    build:
      context: ../user-service
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    environment:
      AUTH_SERVICE_URL: http://auth-service:8083
      SPRING_DATASOURCE_HOST: postgres
      SPRING_DATASOURCE_PORT: 5432
      SPRING_DATASOURCE_DB: ${POSTGRES_DB:-personal_website_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-nzhussup}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-nzhussup}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks:
      - backend-internal

  db-seed:
    image: postgres:17
    depends_on:
      postgres:
        condition: service_healthy
      keycloak-master-realm-init:
        condition: service_completed_successfully
      auth-service:
        condition: service_started
      base-service:
        condition: service_started
      user-service:
        condition: service_started
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-personal_website_db}
      POSTGRES_USER: ${POSTGRES_USER:-nzhussup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nzhussup}
    volumes:
      - ./seed.sql:/seed/seed.sql:ro
      - ./seed.sh:/seed/seed.sh:ro
    entrypoint: ["/bin/sh", "/seed/seed.sh"]
    networks:
      - backend-internal

  image-service:
    build:
      context: ../image-service
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    environment:
      API_GATEWAY_URL: http://api-gateway:8082
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GIN_MODE: release
    volumes:
      - image-data:/app/var/images
    networks:
      - backend-internal

  llm-service:
    build:
      context: ../llm-service
    depends_on:
      redis:
        condition: service_healthy
    environment:
      API_GATEWAY_URL: http://api-gateway:8082
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_API_URL: ${OPENROUTER_API_URL:-https://openrouter.ai/api/v1/chat/completions}
    networks:
      - backend-internal

  api-gateway:
    build:
      context: ../api-gateway
    depends_on:
      auth-service:
        condition: service_started
      base-service:
        condition: service_started
      user-service:
        condition: service_started
      image-service:
        condition: service_started
      llm-service:
        condition: service_started
    environment:
      AUTH_SERVICE_URL: http://auth-service:8083
      BASE_SERVICE_URL: http://base-service:8010
      USER_SERVICE_URL: http://user-service:8084
      IMAGE_SERVICE_URL: http://image-service:8085
      LLM_SERVICE_URL: http://llm-service:8086
    ports:
      - "${API_GATEWAY_PORT:-8082}:8082"
    networks:
      - backend-internal

networks:
  backend-internal:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  image-data:
